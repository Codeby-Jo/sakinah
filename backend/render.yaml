services:
  - type: web
    name: sakinah-backend
    runtime: python
    runtimeVersion: "3.11"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      # No DATABASE_URL — this backend uses Firestore (Firebase Admin SDK) only.
      # The firebase credentials JSON must be mounted as a secret file at deploy time.
      - key: FIREBASE_CERT_PATH
        value: /etc/secrets/firebase-credentials.json
        scope: run

      - key: JWT_SECRET_KEY
        sync: false   # Set this manually in the Render dashboard (keep secret)
        scope: run

    # Mount the Firebase service account JSON as a secret file
    secretFiles:
      - name: firebase-credentials.json
        mountPath: /etc/secrets/firebase-credentials.json
